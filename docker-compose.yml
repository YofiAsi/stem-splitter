services:
  app:
    image: stem-splitter
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    environment:
      - SQLITE_PATH=/var/stems/db.sqlite
      - STEMS_DIR=/var/stems
      - DEMUCS_MODEL=htdemucs
      - DEMUCS_DEVICE=cuda
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - stems_data:/var/stems
    ports:
      - "${PORT:-4000}:4000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  stems_data:
